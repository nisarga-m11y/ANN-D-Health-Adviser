<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="AI Symptom Checking and Health Advice Chatbot diagram">
  <defs>
    <style>
      .title { font: 700 56px Arial, Helvetica, sans-serif; fill: #d01414; }
      .subtitle { font: 700 44px Arial, Helvetica, sans-serif; fill: #0b2a43; }
      .label { font: 700 22px Arial, Helvetica, sans-serif; fill: #0b2a43; letter-spacing: 0.3px; }
      .small { font: 400 18px Arial, Helvetica, sans-serif; fill: #0b2a43; opacity: 0.9; }
      .icon-stroke { stroke: #1b5b83; stroke-width: 6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .icon-fill { fill: #1b5b83; }
      .panel { fill: #d9eefb; stroke: #b9ddf3; stroke-width: 3; rx: 18; }
      .arrow { stroke: #1b5b83; stroke-width: 6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrowhead" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
