    <path class="icon-stroke" d="M130 15 v15"/>
    <path class="icon-stroke" d="M60 150 v15"/>
    <path class="icon-stroke" d="M95 150 v15"/>
    <path class="icon-stroke" d="M130 150 v15"/>
