    <path class="icon-stroke" d="M20 54 h15"/>
    <path class="icon-stroke" d="M20 80 h15"/>
    <path class="icon-stroke" d="M20 106 h15"/>
    <path class="icon-stroke" d="M20 132 h15"/>
    <path class="icon-stroke" d="M155 54 h15"/>
    <path class="icon-stroke" d="M155 80 h15"/>
    <path class="icon-stroke" d="M155 106 h15"/>
    <path class="icon-stroke" d="M155 132 h15"/>
    <path class="icon-stroke" d="M60 15 v15"/>
