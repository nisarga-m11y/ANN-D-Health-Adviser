<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Data Flow Diagram for ANN-D Health Adviser">
  <defs>
    <style>
      .title { font: 800 54px Arial, Helvetica, sans-serif; fill: #0b2a43; }
      .sub { font: 600 22px Arial, Helvetica, sans-serif; fill: #0b2a43; opacity: 0.9; }
      .label { font: 700 20px Arial, Helvetica, sans-serif; fill: #0b2a43; }
      .small { font: 600 16px Arial, Helvetica, sans-serif; fill: #0b2a43; opacity: 0.85; }
      .box { fill: #d9eefb; stroke: #1b5b83; stroke-width: 3; rx: 16; }
      .entity { fill: #fff6db; stroke: #b57b00; stroke-width: 3; rx: 14; }
      .process { fill: #e9f7e9; stroke: #1f7a3a; stroke-width: 3; rx: 18; }
      .store { fill: #f2e9ff; stroke: #6b3fa0; stroke-width: 3; }
      .arrow { stroke: #1b5b83; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .arrow2 { stroke: #1f7a3a; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .note { font: 500 15px Arial, Helvetica, sans-serif; fill: #0b2a43; opacity: 0.75; }
    </style>
    <marker id="ah" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L14,5 L0,10 Z" fill="#1b5b83"/>
    </marker>
    <marker id="ahg" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L14,5 L0,10 Z" fill="#1f7a3a"/>
    </marker>
  </defs>

  <text x="80" y="80" class="title">Data Flow Diagram (ANN-D Health Adviser)</text>
  <text x="80" y="116" class="sub">Text, Image, and Voice symptom analysis with history &amp; reports</text>

  <!-- External Entities -->
  <rect x="80" y="190" width="250" height="110" class="entity"/>
  <text x="205" y="245" text-anchor="middle" class="label">User</text>
  <text x="205" y="275" text-anchor="middle" class="small">(Web / Mobile)</text>

  <rect x="1070" y="190" width="250" height="110" class="entity"/>
  <text x="1195" y="238" text-anchor="middle" class="label">External Services</text>
  <text x="1195" y="268" text-anchor="middle" class="small">TTS / Translation / Call</text>

  <!-- Processes -->
  <rect x="430" y="165" width="540" height="90" class="process"/>
  <text x="700" y="220" text-anchor="middle" class="label">1. Authentication (Register / Login)</text>

  <rect x="430" y="285" width="540" height="110" class="process"/>
  <text x="700" y="335" text-anchor="middle" class="label">2. Symptom Input Handling</text>
  <text x="700" y="365" text-anchor="middle" class="small">Text / Image Upload / Voice Upload (Kannada/English)</text>

  <rect x="430" y="430" width="540" height="120" class="process"/>
  <text x="700" y="482" text-anchor="middle" class="label">3. AI Processing</text>
  <text x="700" y="512" text-anchor="middle" class="small">NLP (NLTK) + TF‑IDF + Naive Bayes</text>

  <rect x="430" y="585" width="540" height="120" class="process"/>
  <text x="700" y="635" text-anchor="middle" class="label">4. Response Generation</text>
  <text x="700" y="665" text-anchor="middle" class="small">Prediction + Advice + Disclaimer + Kannada speech text</text>

  <!-- Data Stores -->
  <!-- Database cylinder -->
  <g>
    <ellipse cx="260" cy="560" rx="170" ry="32" class="store"/>
    <path d="M90 560 v210 c0 18 76 32 170 32 s170-14 170-32 v-210" class="store" fill="none"/>
    <ellipse cx="260" cy="770" rx="170" ry="32" class="store"/>
    <text x="260" y="645" text-anchor="middle" class="label">MySQL / SQLite</text>
    <text x="260" y="675" text-anchor="middle" class="small">Users, ChatHistory, Ratings, Image Analyses</text>
  </g>

  <rect x="1070" y="355" width="250" height="110" class="box"/>
  <text x="1195" y="410" text-anchor="middle" class="label">ML Artifacts</text>
  <text x="1195" y="440" text-anchor="middle" class="small">model.pkl, vectorizer.pkl</text>

  <!-- Flows -->
  <!-- User -> Auth -->
  <path class="arrow" d="M330 245 H430" marker-end="url(#ah)"/>
  <text x="380" y="232" class="note">credentials</text>

  <!-- Auth -> DB -->
  <path class="arrow" d="M520 255 C460 310, 360 330, 300 520" marker-end="url(#ah)"/>
  <text x="390" y="340" class="note">user record</text>

  <!-- Auth -> Input Handling -->
  <path class="arrow2" d="M700 255 V285" marker-end="url(#ahg)"/>

  <!-- User -> Input Handling (messages/files) -->
  <path class="arrow" d="M330 260 C380 310, 390 330, 430 340" marker-end="url(#ah)"/>
  <text x="360" y="322" class="note">text / image / audio</text>

  <!-- Input Handling -> AI Processing -->
  <path class="arrow2" d="M700 395 V430" marker-end="url(#ahg)"/>

  <!-- AI Processing -> ML Artifacts -->
  <path class="arrow" d="M970 490 H1070" marker-end="url(#ah)"/>
  <text x="1005" y="475" class="note">load &amp; infer</text>

  <!-- AI Processing -> Response -->
  <path class="arrow2" d="M700 550 V585" marker-end="url(#ahg)"/>

  <!-- Response -> External Services -->
  <path class="arrow" d="M970 650 C1060 650, 1065 260, 1070 245" marker-end="url(#ah)"/>
  <text x="1040" y="610" class="note">TTS/translate/call</text>

  <!-- Response -> DB (save chat) -->
  <path class="arrow" d="M520 705 C430 730, 360 730, 300 710" marker-end="url(#ah)"/>
  <text x="395" y="745" class="note">store history &amp; ratings</text>

  <!-- Response -> User -->
  <path class="arrow" d="M430 645 C360 645, 340 645, 330 645" marker-end="url(#ah)"/>
  <path class="arrow" d="M330 645 C240 645, 180 500, 180 300" marker-end="url(#ah)" opacity="0"/>
  <path class="arrow" d="M430 645 H330" marker-end="url(#ah)"/>
  <text x="380" y="630" class="note">response + audio (optional)</text>

  <text x="80" y="860" class="note">Note: Output is educational assistance only and not a medical diagnosis.</text>
</svg>
